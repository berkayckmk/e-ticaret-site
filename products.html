<!DOCTYPE html>
<html>
<head>
<title>Ürünler</title>
<link rel="stylesheet" href="style.css">
</head>
<body onload="updateCartCount()">

<header>
<h2>MyShop</h2>
<nav>
<a href="index.html">Ana Sayfa</a>
<a href="products.html">Ürünler</a>
<a href="cart.html">Sepet <span id="cart-count">0</span></a>
</nav>
</header>

<div class="products" id="list"></div>

<script>
let products=[
{name:'Akıllı Saat',price:1200,img:'https://picsum.photos/300?1'},
{name:'Kulaklık',price:800,img:'https://picsum.photos/300?2'},
{name:'Telefon',price:7000,img:'https://picsum.photos/300?3'},
{name:'Laptop',price:15000,img:'https://picsum.photos/300?4'},
{name:'Tablet',price:5000,img:'https://picsum.photos/300?5'},
{name:'Kamera',price:9000,img:'https://picsum.photos/300?6'},
{name:'Ayakkabı',price:1200,img:'https://picsum.photos/300?7'},
{name:'Çanta',price:900,img:'https://picsum.photos/300?8'},
{name:'Gözlük',price:600,img:'https://picsum.photos/300?9'},
{name:'Mouse',price:400,img:'https://picsum.photos/300?10'},
{name:'Klavye',price:700,img:'https://picsum.photos/300?11'},
{name:'Hoparlör',price:1100,img:'https://picsum.photos/300?12'}
];

let html='';
products.forEach((p,i)=>{
html+=`<div class="product" style="animation:fadeIn 0.5s ease ${i*0.1}s forwards; opacity:0">
<img src="${p.img}" onclick="goDetail('${p.name}',${p.price},'${p.img}')">
<div class="product-content">
<h3>${p.name}</h3>
<p>${p.price} TL</p>
<button onclick="addToCart('${p.name}',${p.price})">Sepete Ekle</button>
</div></div>`;
});

document.getElementById('list').innerHTML=html;
</script>

<script src="script.js"></script>

<style>
@keyframes fadeIn {
from {opacity:0; transform:translateY(20px);} 
to {opacity:1; transform:translateY(0);} 
}
</style>

</body>
</html>
